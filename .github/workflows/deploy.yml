name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, pdo, pdo_mysql

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy to cPanel via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /home2/estatem2/repositories/estateman

            # Pull latest code
            git pull origin main

            # Install dependencies
            php -d allow_url_fopen=On composer.phar install --no-dev --optimize-autoloader --no-interaction

            # Clear ALL caches first
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan route:clear
            php artisan event:clear

            # Run migrations
            php artisan migrate --force

            # Rebuild cache
            php artisan optimize

            # Copy assets
            cp -r /home2/estatem2/repositories/estateman/public/assets /home2/estatem2/public_html/assets

            # Sync storage
            cp -r /home2/estatem2/repositories/estateman/storage/app/public/* /home2/estatem2/public_html/storage/ 2>/dev/null || true

            echo "✅ Deployment complete!"